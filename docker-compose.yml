version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - solar-shield-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - solar-shield-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  ingestor:
    build: ./src/ingestor-service
    environment:
      - PORT=${PORT:-3000}
      - REDIS_URL=redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - RABBITMQ_URL=amqp://${RABBITMQ_HOST:-rabbitmq}:${RABBITMQ_PORT:-5672}
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    networks:
      - solar-shield-net
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notifier:
    build: ./src/notifier-service
    environment:
      - PORT=${NOTIFIER_PORT:-3001}
      - REDIS_URL=redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - RABBITMQ_URL=amqp://${RABBITMQ_HOST:-rabbitmq}:${RABBITMQ_PORT:-5672}
    ports:
      - "${NOTIFIER_PORT:-3001}:${NOTIFIER_PORT:-3001}"
    networks:
      - solar-shield-net
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - solar-shield-net
    depends_on:
      - ingestor
      - notifier
    restart: unless-stopped

networks:
  solar-shield-net:
    driver: bridge
